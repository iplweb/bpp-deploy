x-logging: &default-logging
  driver: "local"
  options:
    max-size: "${LOG_MAX_SIZE:-150m}"
    max-file: "${LOG_MAX_FILE:-5}"

services:

  webserver:
    image: nginx:1.29.7
    restart: always
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    environment:
      NGINX_ENVSUBST_FILTER: "DJANGO_BPP_"
    ports:
      - 80:80
      - 443:443
      - 443:443/udp    # HTTP/3 (QUIC)
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null http://127.0.0.1:80/healthz || exit 1"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - staticfiles:/var/www/html/staticroot
      - media:/mediaroot
      - ${BPP_CONFIGS_DIR}/ssl:/etc/ssl/private:ro
      - ./defaults/webserver/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./defaults/webserver/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./defaults/webserver/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
    deploy:
      resources:
        limits:
          # Obserwowane idle ~32 MiB, ale proxy_buffers 16x16k = 256 KB/connection
          # przy buforowaniu HTML-a z Django. Przy 500 concurrent requests to realnie
          # +110 MB RAM. 256m daje headroom pod burst + HTTP/3 QUIC + duze uploady.
          memory: ${WEBSERVER_MEM_LIMIT:-256m}
          cpus: "${WEBSERVER_CPU_LIMIT:-2.0}"

  redis:
    image: redis:8.6.2
    restart: always
    logging: *default-logging
    # --maxmemory + allkeys-lru: Redis sam ewiktuje klucze gdy zbliza sie
    # do wlasnego limitu, zamiast czekac az Docker zabije caly kontener.
    # Wewnetrzny limit musi byc mniejszy niz zewnetrzny, zeby eviction
    # mial szanse zadzialac przed hard-OOM-kill-em.
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAXMEMORY:-200mb}
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 3s
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis:/data
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256m}
          cpus: "${REDIS_CPU_LIMIT:-0.5}"

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    restart: always
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    #ports:
    #  - 5672:5672   # AMQP protocol port
    #  - 15672:15672 # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${DJANGO_BPP_RABBITMQ_USER:-bpp}
      RABBITMQ_DEFAULT_PASS: ${DJANGO_BPP_RABBITMQ_PASS:-bpp}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: >-
        -rabbit log_levels [{connection,error},{channel,error},{mirroring,error},{federation,error},{upgrade,error}]
        log [{console,[{level,error}]}]
    healthcheck:
      # rabbitmq-diagnostics check_running zwraca natychmiast gdy aplikacja
      # 'rabbit' jest fully booted (oficjalna rekomendacja RabbitMQ na
      # healthcheck). Stary healthcheck uzywal `rabbitmqctl await_startup`,
      # ktory z definicji BLOKUJE az do gotowosci - antywzorzec, marnowal
      # timeout zamiast zwracac szybkie "jeszcze nie".
      #
      # start_period 180s: cold start Erlang VM + mnesia recovery + plugin load
      # na obserwowanym hostcie zajmuje ~35-40s (logi: "Starting broker...
      # completed" ~36s po starcie kontenera). Pod CPU contention (appserver
      # robi migracje, workery startuja rownolegle) potrafi przekroczyc 60s.
      # Krotki grace (5s) sprawial ze `compose up --wait` flagowal rabbitmq
      # jako unhealthy zanim broker skonczyl boot - wszystkie zalezne uslugi
      # (workery, beat, flower) odmawialy startu mimo ze za chwile broker
      # i tak stawal sie healthy.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      start_period: 180s
      interval: 5s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
      - ${BPP_CONFIGS_DIR}/rabbitmq:/etc/rabbitmq:ro
    deploy:
      resources:
        limits:
          memory: ${RABBITMQ_MEM_LIMIT:-512m}
          cpus: "${RABBITMQ_CPU_LIMIT:-1.0}"
    labels:
      # Sidecar autoheal restartuje rabbitmq gdy `check_running` zglosi
      # unhealthy w runtime - typowo gdy Erlang VM zyje, ale aplikacja 'rabbit'
      # jest wedged (np. po OOM event w mnesia, deadlock w supervisorze).
      # `restart: always` reaguje tylko na exit procesu, autoheal wypelnia
      # luke. Restart brokera zmusza klientow (workery, beat) do reconnectu,
      # ale jest mniej szkodliwy niz wisznie broker z ktorym nikt nie gada.
      autoheal: "true"

volumes:
  redis:
  rabbitmq_data:
