x-logging: &default-logging
  driver: "local"
  options:
    max-size: "${LOG_MAX_SIZE:-150m}"
    max-file: "${LOG_MAX_FILE:-5}"

services:

  workerserver:
    # JEDEN worker Celery obsluguje OBIE kolejki (celery + denorm). Wczesniej
    # byly dwa osobne kontenery (workerserver-general + workerserver-denorm),
    # kazdy forkowal `nproc` dzieci prefork (kazde = pelna kopia Django ~250 MB),
    # wiec zjadaly ~2x. Konsolidacja oszczedza jedna kopie Django i polowe dzieci.
    # Zadania kolejki `denorm` (`flush_single`) sa krotkie, wiec spokojnie dziela
    # jeden worker z kolejka domyslna - bez dedykowanego serwera i bez priorytetu
    # (kombu robi round-robin po kolejkach; to akceptowalne, patrz spec single-worker).
    #
    # CELERY_QUEUE=celery,denorm jest ustawione JAWNIE (a nie polegamy na nowym
    # domyslnym entrypoincie obrazu), zeby konsolidacja dzialala plynnie takze na
    # OBECNYM opublikowanym obrazie - inaczej do czasu wydania nowego obrazu kolejka
    # denorm zostalaby bez konsumenta. Concurrency (domyslnie 75% rdzeni) i recykling
    # procesow czyta `celery_tasks.py` (app.conf) z env DOPIERO na nowym obrazie;
    # na starym te zmienne sa ignorowane (nieszkodliwie). Knoby: CELERY_WORKER_*.
    image: iplweb/bpp_workerserver:${DOCKER_VERSION:-latest}
    restart: always
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    environment:
      CELERY_QUEUE: "celery,denorm"
      # Recykling procesu-dziecka po przekroczeniu progu RSS (KB) - oddaje pamiec
      # do OS, tnie narost dlugo zyjacego Pythona. Czytane przez celery_tasks.py
      # (app.conf) na obrazie z czerwca 2026+. Nadpisywalne w .env.
      CELERY_WORKER_MAX_MEMORY_PER_CHILD: "${CELERY_WORKER_MAX_MEMORY_PER_CHILD:-300000}"
      # Opcjonalnie: jawny procent rdzeni (domyslnie 75% w obrazie) lub recykling
      # po N zadaniach - odkomentuj/ustaw w .env w razie potrzeby:
      # CELERY_WORKER_CONCURRENCY_PERCENT / CELERY_WORKER_MAX_TASKS_PER_CHILD.
    volumes:
      - staticfiles:/staticroot
      - media:/mediaroot
    depends_on:
      # Musi czekać na appserver, gdyż appserver aktualizuje ewentualnie baze danych.
      # Czy nawet w ogóle ją buduje...
      appserver:
        condition: service_healthy
      # Twardy gating na broker (Redis pelni role brokera + result backend) -
      # eliminuje startup race przy `up --force-recreate` (worker startowal
      # zanim broker skonczyl handshake, dostawal RST i zostawal w stanie
      # unhealthy bez wyjscia procesu).
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Fallback do starej nazwy WORKER_GENERAL_* (sprzed konsolidacji+renamu),
          # zeby `git pull && make up` na starym .env zadzialal bez recznej edycji.
          memory: ${WORKER_MEM_LIMIT:-${WORKER_GENERAL_MEM_LIMIT:-1536m}}
          cpus: "${WORKER_CPU_LIMIT:-${WORKER_GENERAL_CPU_LIMIT:-2.0}}"
    labels:
      # Sidecar autoheal restartuje ten kontener gdy image-level healthcheck
      # (`celery inspect ping`) zglosi unhealthy - typowo gdy proces zyje, ale
      # kombu wisi w reconnect loop po zerwanym connection do brokera.
      autoheal: "true"
      ofelia.enabled: "true"
      # Nocny restart zbija skumulowany memory leak Celery workera (Python long-running).
      # kill 1 -> SIGTERM do PID 1 -> graceful shutdown -> restart:always wskrzesza.
      ofelia.job-exec.restart_self.schedule: "0 5 5 * * *"
      ofelia.job-exec.restart_self.command: "kill 1"

  denorm-queue:
    # run only SINGLE service, this is only a mechanism to pass
    # PostgreSQL LISTEN to Celery queue
    image: iplweb/bpp_denorm_queue:${DOCKER_VERSION:-latest}
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    # entrypoint: ["python", "src/manage.py", "denorm_queue"]
    # healthcheck:
    #   test: ["CMD-SHELL", "pgrep -f 'denorm_queue' > /dev/null"]
    #   start_period: 10s
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    restart: always
    depends_on:
      workerserver:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${DENORM_QUEUE_MEM_LIMIT:-320m}
          cpus: "${DENORM_QUEUE_CPU_LIMIT:-1.0}"
    labels:
      ofelia.enabled: "true"
      # Restart najpozniej w staggered secie - po wszystkich pozostalych, zeby NOTIFY
      # ze swiezo podniesionego workera mialy do czego trafic.
      ofelia.job-exec.restart_self.schedule: "0 25 5 * * *"
      ofelia.job-exec.restart_self.command: "kill 1"

  workerserver-status:
    image: iplweb/bpp_workerserver:${DOCKER_VERSION:-latest}
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    entrypoint: celery -A django_bpp.celery_tasks status
    depends_on:
      workerserver:
        condition: service_healthy
    profiles: ['manual']

  celerybeat:
    image: iplweb/bpp_beatserver:${DOCKER_VERSION:-latest}
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    restart: always
    volumes:
      - staticfiles:/staticroot
      - media:/mediaroot
    depends_on:
      redis:
        condition: service_healthy
      appserver:
        condition: service_started
    healthcheck:
      # Image healthcheck (start_period 40s) flaguje unhealthy podczas cold startu
      # Django w celerybeat - import django_bpp.celery_tasks + broker connect potrafi
      # zajac > 70s gdy appserver zaraz obok zjada CPU migracjami. Wydluzamy grace
      # zeby `compose up --wait` nie wywalal sie zanim broker probe sie ustabilizuje.
      test: ["CMD", "python", "/app/healthcheck_broker.py"]
      interval: 10s
      timeout: 10s
      start_period: 300s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${CELERYBEAT_MEM_LIMIT:-480m}
          cpus: "${CELERYBEAT_CPU_LIMIT:-0.25}"
    labels:
      # Sidecar autoheal restartuje celerybeat gdy broker probe zglosi unhealthy
      # (np. po zerwaniu polaczenia z brokerem w runtime - beat zyje, ale przestaje
      # publikowac taski).
      autoheal: "true"
      ofelia.enabled: "true"
      ofelia.job-exec.restart_self.schedule: "0 20 5 * * *"
      ofelia.job-exec.restart_self.command: "kill 1"

  flower:
    image: mher/flower:2.0.1
    restart: always
    logging: *default-logging
    env_file: ${BPP_CONFIGS_DIR}/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/${DJANGO_BPP_REDIS_DB_BROKER:-1}
      - FLOWER_PORT=5555
      - FLOWER_URL_PREFIX=/flower
      # Ogranicza historie zadan trzymana w RAM, zeby limit 128m byl bezpieczny.
      - FLOWER_MAX_TASKS=${FLOWER_MAX_TASKS:-10000}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - 5555
    deploy:
      resources:
        limits:
          memory: ${FLOWER_MEM_LIMIT:-128m}
          cpus: "${FLOWER_CPU_LIMIT:-0.5}"
    labels:
      ofelia.enabled: "true"
      # Flower akumuluje historie zadan Celery; nocny restart zbija konsumpcje pamieci.
      # mher/flower 2.0.1 opiera sie na python:3.11-slim - ma /bin/kill z procps,
      # ale Docker exec uruchamia go jako root przez PID namespace kontenera,
      # wiec "kill 1" wysyla SIGTERM do PID 1 bezposrednio (bez shell-a).
      ofelia.job-exec.restart_self.schedule: "0 15 5 * * *"
      ofelia.job-exec.restart_self.command: "kill 1"
