x-logging: &default-logging
  driver: "local"
  options:
    max-size: "${LOG_MAX_SIZE:-150m}"
    max-file: "${LOG_MAX_FILE:-5}"

services:

  # Logging and monitoring stack
  dozzle:
    image: amir20/dozzle:v10.2.1
    restart: always
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_BASE: /dozzle
      DOZZLE_AUTH_PROVIDER: forward-proxy
      DOZZLE_AUTH_HEADER_USER: X-WEBAUTH-USER
      DOZZLE_AUTH_HEADER_EMAIL: X-WEBAUTH-EMAIL
      DOZZLE_AUTH_HEADER_NAME: X-WEBAUTH-NAME
      # DOZZLE_ENABLE_SHELL: true
    deploy:
      resources:
        limits:
          memory: ${DOZZLE_MEM_LIMIT:-64m}
          cpus: "${DOZZLE_CPU_LIMIT:-0.25}"

  loki:
    image: grafana/loki:3.7.1
    restart: always
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml -log.level=warn
    volumes:
      - loki_data:/loki
      # Bind-mount tylko samego pliku config (nie calego /etc/loki) - w obrazie
      # moga byc inne pliki tam, ktorych nie chcemy nadpisac.
      - ${BPP_CONFIGS_DIR}/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    deploy:
      resources:
        limits:
          memory: ${LOKI_MEM_LIMIT:-256m}
          cpus: "${LOKI_CPU_LIMIT:-0.5}"

  grafana:
    image: grafana/grafana:12.4.2
    restart: always
    logging: *default-logging
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_HEADERS=Email:X-WEBAUTH-EMAIL Name:X-WEBAUTH-NAME
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      - GF_LOG_LEVEL=error # śmieci logami okrutnie
    volumes:
      - grafana_data:/var/lib/grafana
      - ${BPP_CONFIGS_DIR}/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-192m}
          cpus: "${GRAFANA_CPU_LIMIT:-1.0}"

  alloy:
    image: grafana/alloy:v1.15.0
    restart: always
    logging: *default-logging
    command: >
      run /etc/alloy/config.alloy
      --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${BPP_CONFIGS_DIR}/alloy:/etc/alloy:ro
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: ${ALLOY_MEM_LIMIT:-384m}
          cpus: "${ALLOY_CPU_LIMIT:-0.5}"

  prometheus:
    image: prom/prometheus:v3.11.0
    restart: always
    logging: *default-logging
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=4GB'
      - '--web.enable-lifecycle'
      - '--log.level=warn'
    volumes:
      - prometheus_data:/prometheus
      - ${BPP_CONFIGS_DIR}/prometheus:/etc/prometheus:ro
    depends_on:
      - appserver
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-512m}
          cpus: "${PROMETHEUS_CPU_LIMIT:-1.0}"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    restart: always
    logging: *default-logging
    environment:
      DATA_SOURCE_URI: "${DJANGO_BPP_DB_HOST}:${DJANGO_BPP_DB_PORT}/${DJANGO_BPP_DB_NAME}?sslmode=disable"
      DATA_SOURCE_USER: "${DJANGO_BPP_DB_USER}"
      DATA_SOURCE_PASS: "${DJANGO_BPP_DB_PASSWORD}"
    depends_on:
      dbserver:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${PG_EXPORTER_MEM_LIMIT:-64m}
          cpus: "${PG_EXPORTER_CPU_LIMIT:-0.25}"

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.0
    restart: always
    logging: *default-logging
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.kernel_hung'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    deploy:
      resources:
        limits:
          memory: ${NODE_EXPORTER_MEM_LIMIT:-64m}
          cpus: "${NODE_EXPORTER_CPU_LIMIT:-0.25}"

  netdata:
    image: netdata/netdata:v1.99.0
    hostname: ${DJANGO_BPP_HOSTNAME:-bpp}
    restart: always
    logging: *default-logging
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      # NTFY_TOPIC eksportowany do agenta - health_alarm_notify.conf
      # interpoluje go w `DEFAULT_RECIPIENT_NTFY` (sourced as bash).
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_SERVER=${DJANGO_BPP_NTFY_SERVER:-https://ntfy.sh}
      # Postgres collector DSN z istniejacych zmiennych .env - dziala
      # zarowno w trybie internal (host=dbserver) jak i external
      # (host=external.example.com z .env).
      - PG_USER=${DJANGO_BPP_DB_USER}
      - PG_PASSWORD=${DJANGO_BPP_DB_PASSWORD}
      - PG_HOST=${DJANGO_BPP_DB_HOST}
      - PG_PORT=${DJANGO_BPP_DB_PORT}
      - PG_DB=${DJANGO_BPP_DB_NAME}
      # Wylacz anonimowa telemetrie Netdaty do netdata.cloud.
      - DO_NOT_TRACK=1
      - DISABLE_TELEMETRY=1
    volumes:
      # Configi (bind-mount z BPP_CONFIGS_DIR, RO).
      - ${BPP_CONFIGS_DIR}/netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ${BPP_CONFIGS_DIR}/netdata/go.d:/etc/netdata/go.d:ro
      - ${BPP_CONFIGS_DIR}/netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - ${BPP_CONFIGS_DIR}/netdata/health.d:/etc/netdata/health.d:ro
      # Persistent state (named volumes).
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      # Host visibility (RO).
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      # Docker socket dla auto-discovery kontenerow + cgroup metryk.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:19999/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${NETDATA_MEM_LIMIT:-256m}
          cpus: "${NETDATA_CPU_LIMIT:-1.0}"

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  netdata_lib:
  netdata_cache:
