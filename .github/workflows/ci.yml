name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testy Makefile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Uruchom testy
        run: ./tests/test_makefile.sh

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Inline pre-commit/action@v3.0.1: ten action wewnatrz uzywa
      # actions/cache@v4 (Node 20, deprecated), a v3.0.1 to ostatni
      # release pre-commit/action - nie ma wersji na Node 24.
      # Inline-ujemy logike z actions/cache@v5 zeby usunac warning.
      - name: Cache pre-commit envs
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: |
          python -m pip install pre-commit
          python -m pip freeze --local
          pre-commit run --all-files --show-diff-on-failure --color=always

  test-windows:
    name: Testy Makefile (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Instalacja GNU Make
        run: choco install make -y

      - name: Uruchom testy w Git Bash
        shell: bash
        run: ./tests/test_makefile.sh

  test-macos:
    name: Testy Makefile (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Uruchom testy
        run: ./tests/test_makefile.sh

  yaml-lint:
    name: Walidacja docker-compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Walidacja składni docker-compose
        run: |
          for f in docker-compose*.yml; do
            echo "Checking $f..."
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All docker-compose files valid."
