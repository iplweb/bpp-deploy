name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testy Makefile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Uruchom testy
        run: ./tests/test_makefile.sh

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: pre-commit/action@v3.0.1

  test-windows:
    name: Testy Makefile (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalacja GNU Make
        run: choco install make -y

      - name: Uruchom testy w Git Bash
        shell: bash
        run: ./tests/test_makefile.sh

  test-macos:
    name: Testy Makefile (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Diagnostyka srodowiska
        run: |
          echo "=== OS ==="
          sw_vers
          echo "=== bash ==="
          bash --version | head -1
          /bin/bash --version | head -1
          echo "=== make ==="
          make --version | head -3
          which make
          echo "=== docker ==="
          command -v docker || echo "docker: BRAK"
          echo "=== test make init-configs ==="
          set +e
          TMPD=$(mktemp -d)
          cp -r . "$TMPD/bpp-deploy"
          rm -f "$TMPD/bpp-deploy/.env"
          mkdir -p "$TMPD/test-instance"
          (cd "$TMPD/bpp-deploy" && make init-configs BPP_CONFIGS_DIR="$TMPD/test-instance" </dev/null)
          echo "EXIT=$?"
          rm -rf "$TMPD"

      - name: Uruchom testy
        run: ./tests/test_makefile.sh

  yaml-lint:
    name: Walidacja docker-compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Walidacja składni docker-compose
        run: |
          for f in docker-compose*.yml; do
            echo "Checking $f..."
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All docker-compose files valid."
