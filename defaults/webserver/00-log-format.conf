# ============================================================================
# LOG FORMAT — wspolny named format access logow (kontekst http)
# ============================================================================
#
# Plik trafia do /etc/nginx/conf.d/00-log-format.conf. Stockowy nginx.conf
# robi `include /etc/nginx/conf.d/*.conf;` na poziomie http, wiec log_format
# laduje sie w kontekscie http. Prefix 00- gwarantuje zaladowanie PRZED
# default.conf i vhost-*.conf (glob sortowany alfabetycznie) — nginx wymaga,
# by log_format byl zdefiniowany zanim `access_log ... bpp_access` go uzyje.
#
# bpp_access = combined + pola czasowe i rozmiarowe. Dwa cele jednoczesnie:
#   1) czytelny w Grafanie/Loki (kazde pole widoczne goly okiem),
#   2) parsowalny przez kolektor netdata web_log w trybie log_type: auto
#      (uklad zgodny z rozpoznawanymi formatami go.d/web_log: common +
#      $request_length $request_time $upstream_response_time + referer + UA).
#
# Pola czasowe (sekundy, rozdzielczosc ms):
#   $request_time           - calkowity czas obslugi requestu przez nginx
#   $upstream_response_time - czas odpowiedzi upstreamu (Django/appserver)
#   $request_length         - rozmiar requestu (naglowki + body) w bajtach
#
# UWAGA: nie dodawac pol po "$http_user_agent" (np. $http_x_forwarded_for) —
# zlamaloby to auto-detekcje netdaty. Realny IP klienta jest w $remote_addr
# (nginx to edge), a XFF i tak laduje w logach Django.
log_format bpp_access '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '$request_length $request_time $upstream_response_time '
                      '"$http_referer" "$http_user_agent"';
