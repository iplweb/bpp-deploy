# Kolektor go.d/web_log — metryki liczone z access logu nginx.
#
# Zrodlo: plik /var/log/nginx-shared/bpp_access.log pisany przez webserver
# w formacie `bpp_access` (defaults/webserver/00-log-format.conf), montowany
# RO do netdaty przez wolumen nginx_access_log (docker-compose.monitoring.yml).
#
# Format bpp_access (= common + $request_length $request_time
# $upstream_response_time + referer + UA) jest rozpoznawany przez auto-detekcje
# go.d/web_log, wiec log_type: auto wystarcza i daje:
#   - rozklad kodow HTTP (1xx/2xx/3xx/4xx/5xx) + per-code,
#   - metody, wersje HTTP, bandwidth (body/request bytes),
#   - czas obslugi requestu ($request_time) i upstreamu ($upstream_response_time)
#     -> percentyle latencji.
# Na tych wymiarach dzialaja wbudowane alerty health netdaty (np. nagly wzrost
# udzialu 5xx) -> push na ntfy. To NIE dubluje Loki: Loki trzyma surowe linie
# do przeszukiwania, web_log liczy metryki @1s i alertuje.
#
# Plik nadpisuje wbudowany go.d/web_log.conf (mount RO w monitoring.yml).

jobs:
  - name: bpp_nginx
    path: /var/log/nginx-shared/bpp_access.log
    log_type: auto
    # Gdyby auto-detekcja nie zlapala formatu (sprawdz:
    #   docker compose exec netdata grep web_log /var/log/netdata/collector.log
    # — komunikat "couldn't auto-detect log format"), zakomentuj `log_type: auto`
    # powyzej i odkomentuj jawny parser ponizej (kolejnosc pol = bpp_access
    # z 00-log-format.conf):
    # log_type: csv
    # csv_config:
    #   format: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent $request_length $request_time $upstream_response_time "$http_referer" "$http_user_agent"'
