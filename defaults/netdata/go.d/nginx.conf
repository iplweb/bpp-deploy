# Kolektor go.d/nginx — live metryki polaczen z endpointu stub_status.
#
# Endpoint definiowany w nginx (defaults/webserver/default.conf.template):
# osobny server { listen 8090; location = /stub_status { stub_status; } }.
# Port 8090 NIE jest publikowany w docker-compose, wiec osiagalny tylko
# w sieci dockera (netdata -> webserver:8090).
#
# Metryki: active connections, accepts/handled/requests, reading/writing/waiting.
# Do statystyk per-status-code / latencji sluzy osobny kolektor web_log
# (defaults/netdata/go.d/web_log.conf), ktory parsuje access log.
#
# Plik nadpisuje wbudowany go.d/nginx.conf (mount RO w docker-compose.monitoring.yml).

jobs:
  - name: bpp_webserver
    url: http://webserver:8090/stub_status
