# Kolektor go.d/docker — metryki kontenerow odpytywane przez Docker API
# (unix socket zamontowany RO w docker-compose.monitoring.yml).
#
# Nadpisuje wbudowany (stock) go.d/docker.conf. Powod: domyslny interwal
# 1 s (globalne `update every = 1` z netdata.conf) jest za krotki — jeden
# przebieg zbierania statystyk WSZYSTKICH kontenerow trwa ~1 s, wiec netdata
# co drugi tick loguje "skipping data collection: previous run is still in
# progress". To info-szum, nie blad, ale zalewa logi. Interwal 3 s daje
# zapas: przebieg konczy sie z naddatkiem przed kolejnym tickiem.
#
# Plik jest copy_if_missing (ensure-config-files.sh) — jako NOWY plik trafia
# na kazdy host przy najblizszym `make up`; pozniejsze reczne zmiany przezyja
# upgrade. Tuning interwalu: edytuj `update_every` ponizej.

update_every: 3

jobs:
  - name: local
    address: 'unix:///var/run/docker.sock'
    timeout: 5
    # Rozmiar warstw kontenera (docker ps -s) jest kosztowny — nie zbieramy.
    collect_container_size: no
